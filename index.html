<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa 3D - Base Inicial</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.20.2/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
    #map { width: 100%; height: 100%; }
    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px);
    }
    .panel h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .panel p {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.4;
      color: #333;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .controls button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Mapa 3D - Base Inicial</h1>
    <p>Projeto inicial pronto para Vercel. Nesta etapa, o mapa carrega prédios em 3D e permite alternar a inclinação para dar efeito de visualização tridimensional.</p>
    <div class="controls">
      <button id="btn3d">Ativar 3D</button>
      <button id="btnTop">Vista superior</button>
    </div>
    <div class="status" id="status">
      Status: carregando mapa...
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@5.20.2/dist/maplibre-gl.js"></script>
  <script>
    const center = [-46.5333, -23.6667]; // Santo André/SP (ajuste se quiser)

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/bright',
      center,
      zoom: 15.8,
      pitch: 55,
      bearing: -20,
      antialias: true,
      canvasContextAttributes: { antialias: true }
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    const status = document.getElementById('status');
    const btn3d = document.getElementById('btn3d');
    const btnTop = document.getElementById('btnTop');

    btn3d.addEventListener('click', () => {
      map.easeTo({ pitch: 60, bearing: -20, duration: 900 });
    });

    btnTop.addEventListener('click', () => {
      map.easeTo({ pitch: 0, bearing: 0, duration: 900 });
    });

    map.on('load', () => {
      const layers = map.getStyle().layers || [];
      let labelLayerId;

      for (let i = 0; i < layers.length; i++) {
        if (layers[i].type === 'symbol' && layers[i].layout && layers[i].layout['text-field']) {
          labelLayerId = layers[i].id;
          break;
        }
      }

      map.addSource('openfreemap', {
        type: 'vector',
        url: 'https://tiles.openfreemap.org/planet'
      });

      map.addLayer({
        id: '3d-buildings',
        source: 'openfreemap',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 15,
        filter: ['!=', ['get', 'hide_3d'], true],
        paint: {
          'fill-extrusion-color': [
            'interpolate', ['linear'], ['get', 'render_height'],
            0, '#d9d9d9',
            60, '#b8c4d6',
            120, '#8ca6c1',
            250, '#6388af'
          ],
          'fill-extrusion-height': [
            'interpolate', ['linear'], ['zoom'],
            15, 0,
            16, ['get', 'render_height']
          ],
          'fill-extrusion-base': [
            'case',
            ['>=', ['zoom'], 16],
            ['get', 'render_min_height'],
            0
          ],
          'fill-extrusion-opacity': 0.92
        }
      }, labelLayerId);

      status.textContent = 'Status: mapa carregado com prédios 3D. Próximo passo: integrar postes, filtros e camadas.';
    });

    map.on('error', (e) => {
      console.error(e);
      status.textContent = 'Status: ocorreu um erro ao carregar o mapa. Verifique o console do navegador.';
    });
  </script>
</body>
</html>
